<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon TCG</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #1a1d2e;
  --surface:  #242740;
  --surface2: #2e3254;
  --border:   #404570;
  --text:     #e8eaf6;
  --dim:      #8890b8;
  --green:    #4caf82;
  --red:      #e05555;
  --yellow:   #f0c040;
  --blue:     #5090e0;
  --legal:    #4caf82;
  --legal-bg: rgba(76,175,130,0.15);
  --legal-border: rgba(76,175,130,0.7);
  --selected: rgba(80,144,224,0.25);
  --selected-border: rgba(80,144,224,0.9);
  --hp-good:  #4caf82;
  --hp-mid:   #f0c040;
  --hp-low:   #e05555;
}
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
             background: var(--bg); color: var(--text); font-size: 14px; }

/* ── Layout ───────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#header h1 { font-size: 1.1rem; font-weight: 700; color: var(--yellow); letter-spacing: 1px; }
#turn-info  { font-size: 0.85rem; color: var(--dim); }
#header-btns { display: flex; gap: 8px; }

#main { display: flex; flex: 1; overflow: hidden; }

/* ── Board column ─────────────────────────────────────────── */
#board {
  flex: 1; display: flex; flex-direction: column;
  padding: 10px; gap: 8px; overflow-y: auto;
}

/* ── Side panel ───────────────────────────────────────────── */
#sidebar {
  width: 260px; display: flex; flex-direction: column;
  background: var(--surface); border-left: 1px solid var(--border);
  overflow: hidden; flex-shrink: 0;
}
#log-title { padding: 8px 12px; font-size: 0.75rem; font-weight: 600;
             text-transform: uppercase; letter-spacing: 1px; color: var(--dim);
             border-bottom: 1px solid var(--border); }
#log { flex: 1; overflow-y: auto; padding: 8px; font-size: 0.78rem;
       line-height: 1.6; color: var(--dim); }
#log p { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
#log p:last-child { color: var(--text); }

/* ── Sections ─────────────────────────────────────────────── */
.section-label {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--dim); padding: 2px 0;
}

/* ── Zone row ─────────────────────────────────────────────── */
.zone-row {
  display: flex; gap: 8px; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px;
}
.zone-label {
  font-size: 0.65rem; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 4px;
}

/* ── Deck / Discard piles ─────────────────────────────────── */
.pile-box {
  width: 64px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.pile-card {
  width: 54px; height: 74px; border-radius: 5px; border: 1px solid var(--border);
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: var(--dim); text-align: center;
  cursor: default; position: relative;
}
.pile-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
.pile-count { font-size: 0.7rem; color: var(--dim); }

/* ── KO counter ───────────────────────────────────────────── */
.ko-box {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 8px;
}
.ko-label { font-size: 0.6rem; text-transform: uppercase; color: var(--dim); }
.ko-pips   { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
.ko-pip {
  width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface2);
}
.ko-pip.filled { background: var(--yellow); border-color: #d4a800; }

/* ── Active Pokémon ───────────────────────────────────────── */
.active-zone { flex: 0 0 auto; }
.pokemon-card-large {
  width: 110px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--surface2); padding: 6px; cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
}
.pokemon-card-large:hover { border-color: var(--blue); }
.pokemon-card-large.legal { border-color: var(--legal-border); background: var(--legal-bg);
                             box-shadow: 0 0 8px rgba(76,175,130,0.35); }
.pokemon-card-large.selected { border-color: var(--selected-border); background: var(--selected); }

.pcard-img { width: 100%; height: 72px; object-fit: cover; border-radius: 4px;
             background: var(--surface); margin-bottom: 4px; }
.pcard-img-placeholder { width: 100%; height: 72px; border-radius: 4px;
                          background: var(--surface); display: flex;
                          align-items: center; justify-content: center;
                          font-size: 0.6rem; color: var(--dim); margin-bottom: 4px; }
.pcard-name  { font-size: 0.72rem; font-weight: 600; white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; }
.pcard-stage { font-size: 0.58rem; color: var(--dim); }

.hp-bar-wrap { margin: 3px 0; }
.hp-bar-bg   { width: 100%; height: 5px; background: var(--surface);
               border-radius: 3px; overflow: hidden; }
.hp-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.hp-text { font-size: 0.6rem; color: var(--dim); margin-top: 1px; }

.energy-row { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }
.energy-pip {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.45rem; font-weight: 700; color: #000;
}

/* ── Attacks on active ────────────────────────────────────── */
.attacks-list { margin-top: 4px; display: flex; flex-direction: column; gap: 3px; }
.attack-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 5px; cursor: pointer; text-align: left;
  transition: border-color 0.15s, background 0.15s;
  font-size: 0.62rem; color: var(--dim);
}
.attack-btn.legal { border-color: var(--legal-border); color: var(--text);
                    background: var(--legal-bg); cursor: pointer; }
.attack-btn.legal:hover { background: rgba(76,175,130,0.3); }
.attack-btn:not(.legal) { opacity: 0.45; cursor: not-allowed; }
.attack-name { font-weight: 600; }
.attack-dmg  { color: var(--yellow); font-weight: 700; margin-left: 4px; }
.attack-cost { display: flex; gap: 2px; margin-bottom: 2px; }
.cost-pip    { width: 10px; height: 10px; border-radius: 50%;
               border: 1px solid rgba(255,255,255,0.15); }

/* ── Bench row ────────────────────────────────────────────── */
.bench-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pokemon-card-small {
  width: 80px; border-radius: 6px; border: 2px solid var(--border);
  background: var(--surface2); padding: 5px; cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.pokemon-card-small:hover { border-color: var(--blue); }
.pokemon-card-small.legal { border-color: var(--legal-border); background: var(--legal-bg);
                             box-shadow: 0 0 6px rgba(76,175,130,0.3); }
.pokemon-card-small.selected { border-color: var(--selected-border); }
.pcard-small-img { width: 100%; height: 50px; object-fit: cover; border-radius: 3px;
                   background: var(--surface); margin-bottom: 3px; }
.pcard-small-img-ph { width: 100%; height: 50px; border-radius: 3px; background: var(--surface);
                       display: flex; align-items: center; justify-content: center;
                       font-size: 0.55rem; color: var(--dim); margin-bottom: 3px; }
.bench-empty { width: 80px; height: 90px; border-radius: 6px; border: 1px dashed var(--border);
               background: transparent; display: flex; align-items: center; justify-content: center;
               font-size: 0.6rem; color: var(--border); }

/* ── Hand ─────────────────────────────────────────────────── */
#hand-area { background: var(--surface); border: 1px solid var(--border);
             border-radius: 8px; padding: 8px; }
#hand-cards { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.hand-card {
  width: 76px; border-radius: 6px; border: 2px solid var(--border);
  background: var(--surface2); padding: 5px; cursor: pointer;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  position: relative;
}
.hand-card:hover { transform: translateY(-4px); }
.hand-card.legal { border-color: var(--legal-border); background: var(--legal-bg);
                   box-shadow: 0 0 8px rgba(76,175,130,0.4); }
.hand-card.legal:hover { transform: translateY(-6px); box-shadow: 0 4px 12px rgba(76,175,130,0.5); }
.hand-card.selected { border-color: var(--selected-border); background: var(--selected);
                       transform: translateY(-6px); box-shadow: 0 4px 12px rgba(80,144,224,0.5); }
.hand-card:not(.legal):not(.selected) { opacity: 0.55; cursor: default; }
.hand-card-img { width: 100%; height: 56px; object-fit: cover; border-radius: 3px;
                 background: var(--surface); margin-bottom: 3px; }
.hand-card-img-ph { width: 100%; height: 56px; border-radius: 3px; background: var(--surface);
                     display: flex; align-items: center; justify-content: center;
                     font-size: 0.55rem; color: var(--dim); text-align: center;
                     margin-bottom: 3px; }
.hand-card-name { font-size: 0.6rem; font-weight: 600; white-space: nowrap;
                  overflow: hidden; text-overflow: ellipsis; }
.hand-card-type { font-size: 0.55rem; color: var(--dim); }
.hand-card-badge { position: absolute; top: -5px; right: -5px; background: var(--legal);
                   color: #000; font-size: 0.5rem; font-weight: 700; padding: 1px 4px;
                   border-radius: 8px; }

/* ── Action popup ─────────────────────────────────────────── */
#action-popup {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
#action-popup.open { display: flex; }
.popup-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; min-width: 280px; max-width: 420px;
}
.popup-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
.popup-actions { display: flex; flex-direction: column; gap: 8px; }
.popup-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 12px; cursor: pointer; text-align: left; font-size: 0.82rem;
  color: var(--text); transition: border-color 0.15s, background 0.15s;
}
.popup-btn:hover { border-color: var(--legal-border); background: var(--legal-bg); }
.popup-btn.cancel { color: var(--dim); }
.popup-btn.cancel:hover { border-color: var(--red); color: var(--red); background: transparent; }

/* ── Promotion modal ──────────────────────────────────────── */
#promo-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: none; align-items: center; justify-content: center; z-index: 200;
}
#promo-modal.open { display: flex; }
.promo-box { background: var(--surface); border: 1px solid var(--border);
              border-radius: 12px; padding: 24px; text-align: center; }
.promo-title { font-size: 1.1rem; font-weight: 700; color: var(--yellow); margin-bottom: 6px; }
.promo-sub   { font-size: 0.8rem; color: var(--dim); margin-bottom: 16px; }
.promo-choices { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── Game over overlay ────────────────────────────────────── */
#gameover-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center; z-index: 300;
  flex-direction: column; gap: 16px;
}
#gameover-overlay.open { display: flex; }
#gameover-msg { font-size: 2rem; font-weight: 700; text-align: center; }
#gameover-sub { font-size: 0.9rem; color: var(--dim); }

/* ── Lobby ────────────────────────────────────────────────── */
#lobby {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  display: flex; align-items: center; justify-content: center; z-index: 400;
  flex-direction: column; gap: 20px;
}
.lobby-box { background: var(--surface); border: 1px solid var(--border);
              border-radius: 14px; padding: 32px 40px; text-align: center; min-width: 320px; }
.lobby-title { font-size: 1.5rem; font-weight: 800; color: var(--yellow); margin-bottom: 6px; }
.lobby-sub   { font-size: 0.85rem; color: var(--dim); margin-bottom: 24px; }
.deck-choices { display: flex; gap: 12px; justify-content: center; }
.deck-btn {
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: 10px; padding: 14px 22px; cursor: pointer; font-size: 0.9rem;
  font-weight: 600; transition: all 0.15s; min-width: 130px;
}
.deck-btn:hover { border-color: var(--legal-border); background: var(--legal-bg);
                   box-shadow: 0 0 12px rgba(76,175,130,0.3); }
.deck-btn.lycanroc { border-color: #c84; }
.deck-btn.raichu   { border-color: #fe4; }

/* ── Buttons ──────────────────────────────────────────────── */
.btn {
  padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-size: 0.82rem; font-weight: 600; transition: all 0.15s;
}
.btn:hover  { border-color: var(--blue); background: rgba(80,144,224,0.15); }
.btn.danger { border-color: var(--red); }
.btn.danger:hover { background: rgba(224,85,85,0.15); }
.btn.end-turn { border-color: var(--yellow); color: var(--yellow); }
.btn.end-turn:hover { background: rgba(240,192,64,0.15); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Spinner ──────────────────────────────────────────────── */
.thinking { display: inline-flex; gap: 4px; align-items: center; font-size: 0.8rem;
             color: var(--dim); }
.thinking span { animation: blink 1.2s infinite; }
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

/* ── Scrollbar ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Lobby ──────────────────────────────────────────────── -->
<div id="lobby">
  <div class="lobby-box">
    <div class="lobby-title">Pokémon TCG</div>
    <div class="lobby-sub">Choose your deck to play against the champion bot</div>
    <div class="deck-choices">
      <button class="deck-btn lycanroc" onclick="startGame('lycanroc')">
        🪨 Lycanroc<br><small style="font-weight:400;color:var(--dim)">Fighting</small>
      </button>
      <button class="deck-btn raichu" onclick="startGame('raichu')">
        ⚡ Alolan Raichu<br><small style="font-weight:400;color:var(--dim)">Lightning/Psychic</small>
      </button>
    </div>
  </div>
</div>

<!-- ── Game over ───────────────────────────────────────────── -->
<div id="gameover-overlay">
  <div id="gameover-msg"></div>
  <div id="gameover-sub"></div>
  <button class="btn" onclick="showLobby()">Play Again</button>
</div>

<!-- ── Promotion modal ────────────────────────────────────── -->
<div id="promo-modal">
  <div class="promo-box">
    <div class="promo-title">⚠️ Active Pokémon was KO'd!</div>
    <div class="promo-sub">Choose a Pokémon to send to the Active spot</div>
    <div class="promo-choices" id="promo-choices"></div>
  </div>
</div>

<!-- ── Action popup (for two-step actions) ────────────────── -->
<div id="action-popup">
  <div class="popup-box">
    <div class="popup-title" id="popup-title">Choose target</div>
    <div class="popup-actions" id="popup-actions"></div>
  </div>
</div>

<!-- ── Main App ────────────────────────────────────────────── -->
<div id="app">
  <div id="header">
    <h1>Pokémon TCG</h1>
    <div id="turn-info">—</div>
    <div id="header-btns">
      <div class="thinking" id="thinking-indicator" style="display:none">
        Bot is thinking<span>.</span><span>.</span><span>.</span>
      </div>
      <button class="btn end-turn" id="skip-btn" onclick="skipTurn()" disabled>
        End Turn
      </button>
      <button class="btn danger" onclick="showLobby()">New Game</button>
    </div>
  </div>

  <div id="main">
    <div id="board">

      <!-- ── Opponent side ──────────────────────────────── -->
      <div class="section-label">Opponent</div>
      <div class="zone-row" id="opp-zone">
        <!-- KOs + deck/discard filled by JS -->
      </div>
      <div class="zone-row" id="opp-bench-zone">
        <div>
          <div class="zone-label">Active</div>
          <div id="opp-active-slot"></div>
        </div>
        <div>
          <div class="zone-label">Bench</div>
          <div class="bench-row" id="opp-bench"></div>
        </div>
      </div>

      <!-- ── Divider ────────────────────────────────────── -->
      <div style="border-top:1px solid var(--border);margin:2px 0"></div>

      <!-- ── My side ────────────────────────────────────── -->
      <div class="zone-row" id="my-bench-zone">
        <div>
          <div class="zone-label">My Active</div>
          <div id="my-active-slot"></div>
        </div>
        <div>
          <div class="zone-label">My Bench</div>
          <div class="bench-row" id="my-bench"></div>
        </div>
      </div>
      <div class="zone-row" id="my-zone">
        <!-- KOs + deck/discard filled by JS -->
      </div>

      <!-- ── Hand ──────────────────────────────────────── -->
      <div id="hand-area">
        <div class="section-label">Your Hand</div>
        <div id="hand-cards"></div>
      </div>

    </div><!-- #board -->

    <!-- ── Sidebar log ──────────────────────────────────── -->
    <div id="sidebar">
      <div id="log-title">Battle Log</div>
      <div id="log"></div>
    </div>
  </div><!-- #main -->
</div><!-- #app -->

<script>
/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
let state = null;
let pollInterval = null;

/* ══════════════════════════════════════════════════════════════
   GAME START
══════════════════════════════════════════════════════════════ */
async function startGame(deck) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameover-overlay').classList.remove('open');
  const res  = await fetch('/api/new_game', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({deck})
  });
  state = await res.json();
  render(state);
  startPolling();
}

function showLobby() {
  stopPolling();
  document.getElementById('gameover-overlay').classList.remove('open');
  document.getElementById('lobby').style.display = 'flex';
}

/* ══════════════════════════════════════════════════════════════
   POLLING  (fast poll while bot is thinking, slow otherwise)
══════════════════════════════════════════════════════════════ */
function startPolling() {
  stopPolling();
  pollInterval = setInterval(async () => {
    const res = await fetch('/api/state');
    const s   = await res.json();
    if (s.mode !== 'idle') { state = s; render(s); }
    if (s.mode === 'over')  stopPolling();
  }, state && state.pending_bot ? 300 : 800);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

/* ══════════════════════════════════════════════════════════════
   SEND ACTION
══════════════════════════════════════════════════════════════ */
async function sendAction(actionIdx) {
  closePopup();
  const res = await fetch('/api/action', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({action: actionIdx})
  });
  state = await res.json();
  render(state);
  if (state.pending_bot) startPolling();
}

async function skipTurn() {
  const res = await fetch('/api/skip_turn', { method: 'POST' });
  state = await res.json();
  render(state);
  if (state.pending_bot) startPolling();
}

/* ══════════════════════════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════════════════════════ */
function render(s) {
  if (!s || s.mode === 'idle') return;

  updateHeader(s);
  renderOppZone(s);
  renderMyZone(s);
  renderOppActive(s);
  renderOppBench(s);
  renderMyActive(s);
  renderMyBench(s);
  renderHand(s);
  renderLog(s);

  // Promotion modal
  if (s.promotion && s.promotion.player_idx === s.human_player) {
    showPromoModal(s.promotion);
  } else {
    document.getElementById('promo-modal').classList.remove('open');
  }

  // Game over
  if (s.mode === 'over') {
    stopPolling();
    showGameOver(s);
  }
}

/* ── Header ──────────────────────────────────────────────── */
function updateHeader(s) {
  const isMyTurn = s.is_my_turn;
  const turnEl   = document.getElementById('turn-info');
  const skipBtn  = document.getElementById('skip-btn');
  const thinking = document.getElementById('thinking-indicator');

  turnEl.textContent = `Turn ${s.turn} · ` + (s.pending_bot ? 'Bot thinking…' :
    (isMyTurn ? 'Your turn' : 'Bot\'s turn'));

  skipBtn.disabled = !isMyTurn || s.mode === 'over';
  thinking.style.display = s.pending_bot ? 'inline-flex' : 'none';
}

/* ── Opp info row ─────────────────────────────────────────── */
function renderOppZone(s) {
  const el = document.getElementById('opp-zone');
  el.innerHTML = `
    ${koHtml(s.opp.ko_count, 'Opp KOs')}
    <div style="flex:1"></div>
    ${pileHtml(s.opp.deck_size, s.opp.discard_top, 'Deck', 'Discard')}
    <div style="text-align:center;font-size:0.72rem;color:var(--dim)">
      Hand<br><strong style="font-size:1rem;color:var(--text)">${s.opp.hand_size}</strong>
    </div>`;
}

/* ── My info row ──────────────────────────────────────────── */
function renderMyZone(s) {
  const el = document.getElementById('my-zone');
  const eu = s.energy_used ? '⚡ used' : '⚡ free';
  const su = s.supporter_used ? '📣 used' : '📣 free';
  el.innerHTML = `
    ${koHtml(s.my.ko_count, 'My KOs')}
    <div style="flex:1"></div>
    <div style="text-align:center;font-size:0.7rem;color:${s.energy_used ? 'var(--dim)':'var(--green)'}">
      ${eu}</div>
    <div style="text-align:center;font-size:0.7rem;color:${s.supporter_used ? 'var(--dim)':'var(--green)'}">
      ${su}</div>
    ${pileHtml(s.my.deck_size, s.my.discard_top, 'Deck', 'Discard')}`;
}

function koHtml(count, label) {
  let pips = '';
  for (let i = 0; i < 6; i++)
    pips += `<div class="ko-pip${i < count ? ' filled':''}"></div>`;
  return `<div class="ko-box"><div class="ko-label">${label}</div>
    <div class="ko-pips">${pips}</div>
    <div style="font-size:0.65rem;color:var(--dim)">${count}/6</div></div>`;
}

function pileHtml(deckSize, discardTop, deckLabel, discardLabel) {
  const deckCard = `<div class="pile-card" style="background:var(--surface2)">
    <span>🂠<br>${deckSize}</span></div>`;

  let discardCard;
  if (discardTop) {
    const img = discardTop.img
      ? `<img src="${discardTop.img}" style="width:100%;height:100%;object-fit:cover;border-radius:4px">`
      : `<span style="font-size:0.55rem;text-align:center;padding:2px">${discardTop.name}</span>`;
    discardCard = `<div class="pile-card">${img}</div>`;
  } else {
    discardCard = `<div class="pile-card" style="border-style:dashed"><span>empty</span></div>`;
  }

  return `<div class="pile-box">
    <div class="zone-label">${deckLabel}</div>${deckCard}
    <div class="pile-count">${deckSize}</div>
  </div>
  <div class="pile-box">
    <div class="zone-label">${discardLabel}</div>${discardCard}
  </div>`;
}

/* ── Opponent active ──────────────────────────────────────── */
function renderOppActive(s) {
  const slot = document.getElementById('opp-active-slot');
  slot.innerHTML = s.opp.active
    ? pokemonCardLargeHtml(s.opp.active, false, false, false, s)
    : '<div style="width:110px;height:160px;border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--border)">No Active</div>';
}

/* ── Opponent bench ───────────────────────────────────────── */
function renderOppBench(s) {
  const row = document.getElementById('opp-bench');
  row.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const p = s.opp.bench[i];
    if (p) row.innerHTML += pokemonCardSmallHtml(p, false, false);
    else   row.innerHTML += '<div class="bench-empty">—</div>';
  }
}

/* ── My active ────────────────────────────────────────────── */
function renderMyActive(s) {
  const slot = document.getElementById('my-active-slot');
  if (!s.my.active) {
    slot.innerHTML = '<div style="width:110px;height:190px;border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--border)">No Active</div>';
    return;
  }
  const isAttachLegal = (0 in s.legal_attach);  // slot 0 = active
  slot.innerHTML = pokemonCardLargeHtml(s.my.active, isAttachLegal, true, s.is_my_turn, s);
}

/* ── My bench ─────────────────────────────────────────────── */
function renderMyBench(s) {
  const row = document.getElementById('my-bench');
  row.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const p = s.my.bench[i];
    if (p) {
      const attachLegal = ((i+1) in s.legal_attach);
      row.innerHTML += pokemonCardSmallHtml(p, attachLegal, s.is_my_turn, i, s);
    } else {
      row.innerHTML += '<div class="bench-empty">—</div>';
    }
  }
}

/* ── Large pokemon card (active) ─────────────────────────── */
function pokemonCardLargeHtml(p, attachLegal, showAttacks, isMyTurn, s) {
  const hpColor = p.hp_pct > 50 ? 'var(--hp-good)' : p.hp_pct > 25 ? 'var(--hp-mid)' : 'var(--hp-low)';
  const imgHtml = p.img
    ? `<img class="pcard-img" src="${p.img}" alt="${p.name}">`
    : `<div class="pcard-img-placeholder">${p.name}</div>`;

  const energyHtml = p.energy.map(e =>
    `<div class="energy-pip" style="background:${e.color}" title="${e.type}">${e.type[0]}</div>`
      .repeat(e.count)
  ).join('');

  let attacksHtml = '';
  if (showAttacks && p.attacks) {
    const btns = p.attacks.map((atk, ai) => {
      const legal   = ai in s.legal_attacks;
      const cls     = legal ? 'legal' : '';
      const onclick = legal && isMyTurn ? `onclick="sendAction(${s.legal_attacks[ai]})"` : '';
      const costPips = atk.cost.map(c =>
        `<div class="cost-pip" style="background:${c.color}" title="${c.type}"></div>`).join('');
      return `<div class="attack-btn ${cls}" ${onclick}>
        <div class="attack-cost">${costPips}</div>
        <span class="attack-name">${atk.name}</span>
        ${atk.damage ? `<span class="attack-dmg">${atk.damage}</span>` : ''}
      </div>`;
    }).join('');
    attacksHtml = `<div class="attacks-list">${btns}</div>`;
  }

  const attachCls  = attachLegal && isMyTurn ? 'legal' : '';
  const attachClick = attachLegal && isMyTurn
    ? `onclick="sendAction(${s.legal_attach[0]})"` : '';

  return `<div class="pokemon-card-large ${attachCls}" ${attachClick} title="${attachLegal ? 'Click to attach energy' : ''}">
    ${imgHtml}
    <div class="pcard-name">${p.name}</div>
    <div class="pcard-stage">${p.stage}</div>
    <div class="hp-bar-wrap">
      <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${p.hp_pct}%;background:${hpColor}"></div></div>
      <div class="hp-text">${p.current_hp}/${p.hp} HP</div>
    </div>
    <div class="energy-row">${energyHtml}</div>
    ${attacksHtml}
  </div>`;
}

/* ── Small pokemon card (bench) ──────────────────────────── */
function pokemonCardSmallHtml(p, attachLegal, isMyTurn, benchIdx, s) {
  const hpColor = p.hp_pct > 50 ? 'var(--hp-good)' : p.hp_pct > 25 ? 'var(--hp-mid)' : 'var(--hp-low)';
  const imgHtml = p.img
    ? `<img class="pcard-small-img" src="${p.img}" alt="${p.name}">`
    : `<div class="pcard-small-img-ph">${p.name}</div>`;

  const energyHtml = p.energy.map(e =>
    `<div class="energy-pip" style="background:${e.color};width:11px;height:11px" title="${e.type}">${e.type[0]}</div>`
      .repeat(e.count)
  ).join('');

  const slot  = benchIdx + 1;  // bench slot 1-5
  const cls   = attachLegal && isMyTurn ? 'legal' : '';
  const click = attachLegal && isMyTurn && s
    ? `onclick="sendAction(${s.legal_attach[slot]})"` : '';

  return `<div class="pokemon-card-small ${cls}" ${click}
      title="${p.name} · ${p.current_hp}/${p.hp} HP${attachLegal ? ' · Click to attach energy' : ''}">
    ${imgHtml}
    <div class="pcard-name" style="font-size:0.62rem">${p.name}</div>
    <div class="hp-bar-wrap">
      <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${p.hp_pct}%;background:${hpColor}"></div></div>
    </div>
    <div style="font-size:0.58rem;color:var(--dim)">${p.current_hp}/${p.hp}</div>
    <div class="energy-row">${energyHtml}</div>
  </div>`;
}

/* ── Hand ─────────────────────────────────────────────────── */
function renderHand(s) {
  const container = document.getElementById('hand-cards');
  container.innerHTML = '';

  s.my.hand.forEach((card, i) => {
    const legalActions = s.legal_hand[i] || [];
    const isLegal      = legalActions.length > 0;
    const isSelected   = s.selected === i;
    const cls = [isLegal ? 'legal' : '', isSelected ? 'selected' : ''].join(' ');

    const imgHtml = card.img
      ? `<img class="hand-card-img" src="${card.img}" alt="${card.name}">`
      : `<div class="hand-card-img-ph">${card.name}</div>`;

    const typeLabel = card.card_type === 'pokemon'
      ? (card.stage || 'Pokémon')
      : card.card_type === 'energy'
        ? (card.energy_type + ' Energy')
        : card.card_type;

    // Badge showing number of distinct targets if > 1
    const badge = isLegal && legalActions.length > 1
      ? `<div class="hand-card-badge">${legalActions.length}</div>` : '';

    const onclick = isLegal && s.is_my_turn
      ? `onclick="handleHandClick(${i})"` : '';

    container.innerHTML += `<div class="hand-card ${cls}" ${onclick} title="${card.name}">
      ${imgHtml}
      ${badge}
      <div class="hand-card-name">${card.name}</div>
      <div class="hand-card-type">${typeLabel}</div>
    </div>`;
  });
}

/* ── Hand card click logic ────────────────────────────────── */
function handleHandClick(handIdx) {
  if (!state || !state.is_my_turn) return;
  const actions = state.legal_hand[handIdx] || [];
  if (actions.length === 0) return;

  if (actions.length === 1) {
    // Single unambiguous action — just send it
    sendAction(actions[0].action);
    return;
  }

  // Multiple possible targets — show popup
  const card = state.my.hand[handIdx];
  showActionPopup(card.name, actions);
}

/* ── Action popup ─────────────────────────────────────────── */
function showActionPopup(cardName, actions) {
  const popup   = document.getElementById('action-popup');
  const title   = document.getElementById('popup-title');
  const actionsEl = document.getElementById('popup-actions');

  title.textContent = `${cardName} — choose target`;
  actionsEl.innerHTML = '';

  actions.forEach(a => {
    const label = describeAction(a);
    const btn = document.createElement('button');
    btn.className = 'popup-btn';
    btn.textContent = label;
    btn.onclick = () => sendAction(a.action);
    actionsEl.appendChild(btn);
  });

  const cancel = document.createElement('button');
  cancel.className = 'popup-btn cancel';
  cancel.textContent = '✕ Cancel';
  cancel.onclick = closePopup;
  actionsEl.appendChild(cancel);

  popup.classList.add('open');
}

function closePopup() {
  document.getElementById('action-popup').classList.remove('open');
}

function describeAction(a) {
  if (!state) return a.type;
  const s = state;
  switch (a.type) {
    case 'ATTACH_ENERGY': {
      const slot = a.params.slot;
      if (slot === 0) return `Attach to Active (${s.my.active ? s.my.active.name : '?'})`;
      const p = s.my.bench[slot - 1];
      return `Attach to ${p ? p.name : 'bench slot ' + (slot-1)}`;
    }
    case 'PLAY_POKEMON': return `Bench ${s.my.hand[a.params.hand_idx]?.name || '?'}`;
    case 'EVOLVE': {
      const slot = a.params.slot;
      const tgt  = slot === 5 ? s.my.active?.name : s.my.bench[slot]?.name;
      return `Evolve ${tgt || '?'}`;
    }
    case 'USE_ITEM':      return `Use ${s.my.hand[a.params.hand_idx]?.name || '?'}`;
    case 'USE_SUPPORTER': return `Play ${s.my.hand[a.params.hand_idx]?.name || '?'}`;
    case 'ATTACK':        return `Attack: ${s.my.active?.attacks?.[a.params.atk_idx]?.name || '?'}`;
    default: return a.type;
  }
}

/* ── Promotion modal ──────────────────────────────────────── */
function showPromoModal(promo) {
  const modal   = document.getElementById('promo-modal');
  const choices = document.getElementById('promo-choices');
  choices.innerHTML = '';

  promo.bench.forEach((p, i) => {
    const actionIdx = state.legal_promote[i];
    if (actionIdx === undefined) return;

    const hpColor = p.hp_pct > 50 ? 'var(--hp-good)' : p.hp_pct > 25 ? 'var(--hp-mid)' : 'var(--hp-low)';
    const imgHtml = p.img
      ? `<img style="width:70px;height:50px;object-fit:cover;border-radius:4px;display:block;margin:0 auto 4px"
             src="${p.img}" alt="${p.name}">`
      : `<div style="width:70px;height:50px;background:var(--surface2);border-radius:4px;
              display:flex;align-items:center;justify-content:center;font-size:0.6rem;
              color:var(--dim);margin:0 auto 4px">${p.name}</div>`;

    const btn = document.createElement('div');
    btn.className = 'pokemon-card-small legal';
    btn.style.cssText = 'cursor:pointer;width:90px';
    btn.innerHTML = `${imgHtml}
      <div style="font-size:0.65rem;font-weight:600;text-align:center">${p.name}</div>
      <div style="font-size:0.6rem;color:${hpColor};text-align:center">${p.current_hp}/${p.hp} HP</div>`;
    btn.onclick = () => sendAction(actionIdx);
    choices.appendChild(btn);
  });

  modal.classList.add('open');
}

/* ── Log ──────────────────────────────────────────────────── */
function renderLog(s) {
  const el = document.getElementById('log');
  el.innerHTML = s.log.map(msg => `<p>${escHtml(msg)}</p>`).join('');
  el.scrollTop = el.scrollHeight;
}

/* ── Game over ────────────────────────────────────────────── */
function showGameOver(s) {
  const overlay = document.getElementById('gameover-overlay');
  const msg     = document.getElementById('gameover-msg');
  const sub     = document.getElementById('gameover-sub');

  if (s.winner === s.human_player) {
    msg.textContent = '🎉 You Win!';
    msg.style.color = 'var(--green)';
  } else if (s.winner === -1) {
    msg.textContent = 'Draw';
    msg.style.color = 'var(--yellow)';
  } else {
    msg.textContent = 'Bot Wins!';
    msg.style.color = 'var(--red)';
  }

  const reasonMap = {ko:'by KO', deckout:'by deck-out', timeout:'timeout', '':'game over'};
  sub.textContent = reasonMap[s.win_reason] || '';
  overlay.classList.add('open');
}

/* ── Utils ────────────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close popup on backdrop click
document.getElementById('action-popup').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});
</script>
